### What the name of this/next year's festival is. This appears in the home page.
edition: XXVIII season, 2026
edition-zh: 2026年 · 第28季

### List of all the active programs for the festival in order. Each program listed here must
### have a matching filename in `_programs/`. If a program is not being offered this year, either
### comment out that item or delete it.
programs:
    -   program-slug: choral
    -   program-slug: piano
        zh: piano-zh
    -   program-slug: piano-teaching
        zh: piano-teaching-zh
    -   program-slug: visual-arts
    -   program-slug: writing

### Application deadline, registration fee, and deposit for all programs.
### Optionally if the deadline is to be extended, uncomment the "extended-deadline" line
### with the new date. Both dates are listed so that users understand the previous deadline is old.
### These dates can be overridden on a per-program basis.
application:
    deadline: 2026-10-01
#    extended-deadline: 2027-01-15
    registration-fee: 45
    deposit: 500
    credit-card-fee: 15

### Information regarding fee changes and the cancellation policy.
fees-and-deposits:
    ### "The price of the program was established ____ and may be subject to change..."
    prices-established-on: 2026-05-01
    ### "Registrants will be notified by ___ if the price increases..."
    notification-date-if-prices-increase: 2027-05-01
cancellation-policy:
    ### "Your deposit will be fully refunded without penalty..."
    full-refund:
        before-date: 2026-10-01
    ### "A $___ processing fee will be applied to your refund..."
    processing-fee:
        as-of-date: 2026-10-02
        amount: 50
    ### "Your $___ deposit will be forfeited plus any prepaid nonrefundable expenses."
    withdrawal-fee:
        as-of-date: 2026-12-01
        amount: 100
    ### "Your first installment payment will be forfeited plus any prepaid nonrefundable expenses."
    forfeit:
        as-of-date: 2027-03-01
        deductible: 1500
    ### "No refunds will be made..."
    no-refund:
        as-of-date: 2027-05-01
